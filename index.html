<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#fbfbfd" media="(prefers-color-scheme: light)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="News4Brooke" />
<title>News4Brooke</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<style>
  /* ---------- Refined design tokens (iOS / Apple-store inspired) ---------- */
  :root {
    /* Surfaces — true black + tightly graded elevation */
    --bg:            #000000;
    --bg-elev-1:     #0d0d0f;
    --bg-elev-2:     #15151a;
    --bg-elev-3:     #1f1f25;
    --hairline:      rgba(255,255,255,0.06);
    --hairline-2:    rgba(255,255,255,0.10);

    /* Text — Apple's labelPrimary/Secondary/Tertiary */
    --fg:            #f5f5f7;
    --fg-2:          rgba(235,235,245,0.62);
    --fg-3:          rgba(235,235,245,0.32);

    /* Accent — single restrained tint */
    --tint:          #0a84ff;

    /* Category accents — desaturated, sophisticated palette */
    --c-founders:   #d4af6a;  /* warm gold */
    --c-ai:         #a78bfa;  /* soft violet */
    --c-legal:      #67c9c1;  /* sage teal */
    --c-markets:    #5ec27a;  /* refined green */
    --c-style:      #e88aa5;  /* dusty rose */
    --c-pop:        #e8a572;  /* muted amber */
    --c-us:         #8ba9d9;  /* slate blue */
    --c-canada:     #d88a8a;  /* muted red */
    --c-israel:     #b89dd6;  /* lavender */

    --r-card:    20px;
    --r-chip:    999px;
    --safe-top:  env(safe-area-inset-top);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:            #fbfbfd;
      --bg-elev-1:     #ffffff;
      --bg-elev-2:     #ffffff;
      --bg-elev-3:     #ececef;
      --hairline:      rgba(60,60,67,0.08);
      --hairline-2:    rgba(60,60,67,0.14);
      --fg:            #1d1d1f;
      --fg-2:          rgba(60,60,67,0.70);
      --fg-3:          rgba(60,60,67,0.40);
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Inter", system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    letter-spacing: -0.011em;
    overscroll-behavior-y: contain;
    font-feature-settings: "ss01", "ss02", "kern";
  }
  body {
    min-height: 100vh;
    padding: var(--safe-top) 0 calc(env(safe-area-inset-bottom) + 56px);
  }

  /* ---------- Glass header ---------- */
  header {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--bg) 70%, transparent);
    -webkit-backdrop-filter: saturate(180%) blur(32px);
    backdrop-filter: saturate(180%) blur(32px);
    border-bottom: 0.5px solid transparent;
    transition: border-color 0.2s ease;
  }
  body.scrolled header { border-bottom-color: var(--hairline); }

  .header-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 6px 22px 12px;
  }
  .nav-row {
    display: flex; align-items: center; justify-content: space-between;
    min-height: 44px;
  }
  .nav-title {
    font-size: 16px; font-weight: 600; letter-spacing: -0.022em;
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
  }
  body.scrolled .nav-title { opacity: 1; transform: translateY(0); }

  .live-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px 4px 8px;
    border-radius: 999px;
    background: rgba(48, 209, 88, 0.12);
    color: #5ec27a;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #5ec27a;
    box-shadow: 0 0 0 0 rgba(94,194,122, 0.6);
    animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(94,194,122, 0.6); }
    50%      { box-shadow: 0 0 0 6px rgba(94,194,122, 0); }
  }

  .icon-btn {
    appearance: none; -webkit-appearance: none;
    background: var(--bg-elev-3);
    color: var(--fg);
    border: none;
    width: 34px; height: 34px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, opacity 0.2s ease;
  }
  .icon-btn:active { transform: scale(0.92); background: var(--hairline-2); }
  .icon-btn:disabled { opacity: 0.5; }
  .icon-btn svg { width: 16px; height: 16px; }
  .icon-btn.spin svg { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .large-title {
    font-size: 34px; font-weight: 700; letter-spacing: -0.028em;
    margin: 4px 0 2px;
    line-height: 1.04;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
  }
  .subtitle {
    color: var(--fg-2);
    font-size: 13px; font-weight: 400;
    margin-bottom: 16px;
    letter-spacing: -0.005em;
  }

  /* ---------- Segmented scroll tabs ---------- */
  .segmented {
    display: flex; gap: 6px; overflow-x: auto;
    margin: 0 -22px; padding: 4px 22px 10px;
    scroll-snap-type: x proximity;
    scrollbar-width: none;
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
            mask-image: linear-gradient(90deg, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
  }
  .segmented::-webkit-scrollbar { display: none; }
  .seg {
    flex: 0 0 auto;
    scroll-snap-align: start;
    appearance: none; -webkit-appearance: none;
    background: var(--bg-elev-2);
    border: 0.5px solid var(--hairline);
    color: var(--fg-2);
    padding: 8px 15px;
    border-radius: var(--r-chip);
    font-size: 13.5px; font-weight: 500;
    letter-spacing: -0.005em;
    white-space: nowrap; cursor: pointer;
    transition: background 0.18s ease, color 0.18s ease, transform 0.12s ease, border-color 0.18s ease;
  }
  .seg:active { transform: scale(0.95); }
  .seg.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
    font-weight: 600;
  }

  /* ---------- Main feed ---------- */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 14px 16px 60px;
  }

  .article {
    position: relative;
    display: block; text-decoration: none; color: inherit;
    background: var(--bg-elev-1);
    border: 0.5px solid var(--hairline);
    border-radius: var(--r-card);
    padding: 18px 18px 16px;
    margin-bottom: 10px;
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    will-change: transform;
  }
  .article:active {
    transform: scale(0.985);
    background: var(--bg-elev-2);
    border-color: var(--hairline-2);
  }

  .meta {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
    font-size: 11.5px; color: var(--fg-3);
    letter-spacing: 0.01em;
    font-variant-numeric: tabular-nums;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 0;
    color: var(--chip-color, var(--tint));
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .chip::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--chip-color, var(--tint));
    box-shadow: 0 0 8px var(--chip-color, var(--tint));
    opacity: 0.85;
  }
  .chip[data-cat="founders"]    { --chip-color: var(--c-founders); }
  .chip[data-cat="ai"]          { --chip-color: var(--c-ai); }
  .chip[data-cat="legal-tech"]  { --chip-color: var(--c-legal); }
  .chip[data-cat="markets"]     { --chip-color: var(--c-markets); }
  .chip[data-cat="style"]       { --chip-color: var(--c-style); }
  .chip[data-cat="pop-culture"] { --chip-color: var(--c-pop); }
  .chip[data-cat="us-news"]     { --chip-color: var(--c-us); }
  .chip[data-cat="canada-news"] { --chip-color: var(--c-canada); }
  .chip[data-cat="israel-iran"] { --chip-color: var(--c-israel); }

  .source { font-weight: 500; color: var(--fg-2); text-transform: none; letter-spacing: -0.005em; font-size: 12px; }
  .dot   { color: var(--fg-3); }
  .timeago { color: var(--fg-3); font-size: 12px; }

  .article h2 {
    margin: 0 0 6px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.022em;
    line-height: 1.28;
    color: var(--fg);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .article p {
    margin: 0;
    font-size: 14px;
    line-height: 1.42;
    color: var(--fg-2);
    letter-spacing: -0.008em;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Featured top story */
  .article.featured {
    background:
      radial-gradient(120% 80% at 0% 0%, rgba(212,175,106,0.07) 0%, transparent 55%),
      var(--bg-elev-2);
    border: 0.5px solid var(--hairline-2);
    padding: 22px 20px 20px;
  }
  .article.featured h2 { font-size: 22px; -webkit-line-clamp: 4; letter-spacing: -0.024em; line-height: 1.22; }
  .article.featured p  { font-size: 14px; -webkit-line-clamp: 3; }

  /* Section header — for inside-category groups */
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 22px 4px 10px;
  }
  .section-head h3 {
    margin: 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--fg-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .section-head .count {
    font-size: 11px; color: var(--fg-3); font-variant-numeric: tabular-nums;
  }

  /* States */
  .state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 24px 40px;
    color: var(--fg-2); text-align: center;
    gap: 10px;
  }
  .skel {
    display: block;
    background: var(--bg-elev-1);
    border: 0.5px solid var(--hairline);
    border-radius: var(--r-card);
    padding: 18px;
    margin-bottom: 10px;
  }
  .skel-line {
    height: 12px; border-radius: 4px;
    background: linear-gradient(90deg, var(--bg-elev-2) 25%, var(--bg-elev-3) 50%, var(--bg-elev-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite linear;
    margin-bottom: 8px;
  }
  .skel-line.short { width: 35%; height: 9px; margin-bottom: 14px; }
  .skel-line.title { width: 95%; height: 16px; margin-bottom: 6px; }
  .skel-line.title-2 { width: 75%; height: 16px; margin-bottom: 12px; }
  .skel-line.body { width: 90%; height: 10px; }
  .skel-line.body-2 { width: 70%; height: 10px; margin-bottom: 0; }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

  /* Stagger-in animation */
  .article {
    animation: rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Footer */
  footer {
    text-align: center; padding: 20px 20px 0;
    color: var(--fg-3); font-size: 11px;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="nav-row">
      <span class="nav-title">News4Brooke</span>
      <div style="display:flex; align-items:center; gap:10px;">
        <span class="live-pill"><span class="live-dot"></span>Live</span>
        <button class="icon-btn" id="refresh-btn" type="button" aria-label="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-3.2-6.9"/>
            <path d="M21 4v5h-5"/>
          </svg>
        </button>
      </div>
    </div>
    <h1 class="large-title" id="greeting">Today</h1>
    <div class="subtitle" id="subtitle">Curating your headlines…</div>
    <div class="segmented" id="tabs" role="tablist">
      <button class="seg active" data-cat="all" role="tab">For You</button>
      <button class="seg" data-cat="founders" role="tab">Founders &amp; VC</button>
      <button class="seg" data-cat="ai" role="tab">AI</button>
      <button class="seg" data-cat="legal-tech" role="tab">Legal Tech</button>
      <button class="seg" data-cat="markets" role="tab">Markets</button>
      <button class="seg" data-cat="style" role="tab">Style &amp; Beauty</button>
      <button class="seg" data-cat="pop-culture" role="tab">Pop Culture</button>
      <button class="seg" data-cat="us-news" role="tab">US</button>
      <button class="seg" data-cat="canada-news" role="tab">Canada</button>
      <button class="seg" data-cat="israel-iran" role="tab">Israel/Iran</button>
    </div>
  </div>
</header>

<main>
  <div id="feed">
    <!-- Skeleton placeholders shown while first load is in flight -->
    <div class="skel">
      <div class="skel-line short"></div>
      <div class="skel-line title"></div>
      <div class="skel-line title-2"></div>
      <div class="skel-line body"></div>
      <div class="skel-line body-2"></div>
    </div>
    <div class="skel">
      <div class="skel-line short"></div>
      <div class="skel-line title"></div>
      <div class="skel-line title-2"></div>
      <div class="skel-line body"></div>
      <div class="skel-line body-2"></div>
    </div>
    <div class="skel">
      <div class="skel-line short"></div>
      <div class="skel-line title"></div>
      <div class="skel-line title-2"></div>
      <div class="skel-line body"></div>
      <div class="skel-line body-2"></div>
    </div>
  </div>
</main>

<footer>News4Brooke · curated continuously for you</footer>

<script src="app.js"></script>
<script>
  const onScroll = () => {
    document.body.classList.toggle('scrolled', window.scrollY > 24);
  };
  window.addEventListener('scroll', onScroll, { passive: true });
</script>
</body>
</html>
