<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#f7f7f8" media="(prefers-color-scheme: light)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="News4Brooke" />
<title>News4Brooke</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<style>
  /* ---------- Design tokens (iOS-inspired) ---------- */
  :root {
    --bg:            #000000;
    --bg-elev-1:     #101012;
    --bg-elev-2:     #18181b;
    --bg-elev-3:     #232327;
    --separator:     rgba(255,255,255,0.08);
    --separator-strong: rgba(255,255,255,0.14);
    --fg:            #f5f5f7;
    --fg-secondary:  rgba(235,235,245,0.60);
    --fg-tertiary:   rgba(235,235,245,0.35);
    --tint:          #0a84ff;
    --tint-2:        #5e5ce6;
    /* category accents — iOS system colors */
    --c-legal:   #64d2ff;  /* cyan */
    --c-bravo:   #ff375f;  /* pink */
    --c-pop:     #ff9f0a;  /* orange */
    --c-us:      #30d158;  /* green */
    --c-canada:  #ff453a;  /* red */
    --c-israel:  #bf5af2;  /* purple */

    --r-card:    18px;
    --r-chip:    999px;
    --header-h:  auto;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:            #f7f7f8;
      --bg-elev-1:     #ffffff;
      --bg-elev-2:     #ffffff;
      --bg-elev-3:     #ececef;
      --separator:     rgba(60,60,67,0.10);
      --separator-strong: rgba(60,60,67,0.18);
      --fg:            #1c1c1e;
      --fg-secondary:  rgba(60,60,67,0.68);
      --fg-tertiary:   rgba(60,60,67,0.38);
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    letter-spacing: -0.011em;
    overscroll-behavior-y: contain;
  }
  body {
    min-height: 100vh;
    padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 40px);
  }

  /* ---------- Sticky header with glass blur ---------- */
  header {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--bg) 72%, transparent);
    -webkit-backdrop-filter: saturate(180%) blur(28px);
    backdrop-filter: saturate(180%) blur(28px);
    border-bottom: 0.5px solid var(--separator);
    transition: padding 0.25s ease, border-color 0.2s ease;
  }
  .header-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 8px 20px 12px;
  }
  .nav-row {
    display: flex; align-items: center; justify-content: space-between;
    min-height: 44px;
  }
  .nav-title {
    font-size: 17px; font-weight: 600; letter-spacing: -0.022em;
    opacity: 0; transform: translateY(6px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
  }
  body.scrolled .nav-title { opacity: 1; transform: translateY(0); }

  .icon-btn {
    appearance: none; -webkit-appearance: none;
    background: var(--bg-elev-3);
    color: var(--fg);
    border: none;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, opacity 0.2s ease;
  }
  .icon-btn:active { transform: scale(0.92); background: var(--separator-strong); }
  .icon-btn:disabled { opacity: 0.5; }
  .icon-btn svg { width: 17px; height: 17px; }
  .icon-btn.spin svg { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .large-title {
    font-size: 34px; font-weight: 700; letter-spacing: -0.026em;
    margin: 2px 0 2px;
    line-height: 1.05;
  }
  .subtitle {
    color: var(--fg-secondary);
    font-size: 13px; font-weight: 400;
    margin-bottom: 12px;
  }

  /* ---------- Segmented control ---------- */
  .segmented {
    display: flex; gap: 6px; overflow-x: auto;
    margin: 0 -20px; padding: 4px 20px 8px;
    scroll-snap-type: x proximity;
    scrollbar-width: none;
  }
  .segmented::-webkit-scrollbar { display: none; }
  .seg {
    flex: 0 0 auto;
    scroll-snap-align: start;
    appearance: none; -webkit-appearance: none;
    background: var(--bg-elev-2);
    border: 0.5px solid var(--separator);
    color: var(--fg-secondary);
    padding: 7px 14px;
    border-radius: var(--r-chip);
    font-size: 14px; font-weight: 500;
    letter-spacing: -0.01em;
    white-space: nowrap; cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, transform 0.12s ease;
  }
  .seg:active { transform: scale(0.96); }
  .seg.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
    font-weight: 600;
  }

  /* ---------- Main feed ---------- */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px 16px 60px;
  }

  .article {
    display: block; text-decoration: none; color: inherit;
    background: var(--bg-elev-1);
    border: 0.5px solid var(--separator);
    border-radius: var(--r-card);
    padding: 16px;
    margin-bottom: 10px;
    transition: transform 0.15s ease, background 0.15s ease;
    will-change: transform;
  }
  .article:active {
    transform: scale(0.985);
    background: var(--bg-elev-2);
  }

  .meta {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
    font-size: 12px; color: var(--fg-tertiary);
    letter-spacing: -0.005em;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px;
    border-radius: var(--r-chip);
    background: color-mix(in srgb, var(--chip-color, var(--tint)) 16%, transparent);
    color: var(--chip-color, var(--tint));
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.005em;
  }
  .chip[data-cat="legal-tech"]  { --chip-color: var(--c-legal); }
  .chip[data-cat="bravo"]       { --chip-color: var(--c-bravo); }
  .chip[data-cat="pop-culture"] { --chip-color: var(--c-pop); }
  .chip[data-cat="us-news"]     { --chip-color: var(--c-us); }
  .chip[data-cat="canada-news"] { --chip-color: var(--c-canada); }
  .chip[data-cat="israel-iran"] { --chip-color: var(--c-israel); }

  .source { font-weight: 500; color: var(--fg-secondary); }
  .dot { color: var(--fg-tertiary); }

  .article h2 {
    margin: 0 0 6px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.019em;
    line-height: 1.28;
    color: var(--fg);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .article p {
    margin: 0;
    font-size: 14px;
    line-height: 1.4;
    color: var(--fg-secondary);
    letter-spacing: -0.008em;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Featured / "Top story" — slightly elevated */
  .article.featured {
    background: linear-gradient(180deg,
      color-mix(in srgb, var(--bg-elev-2) 100%, transparent) 0%,
      var(--bg-elev-1) 100%);
    border: 0.5px solid var(--separator-strong);
  }
  .article.featured h2 { font-size: 20px; -webkit-line-clamp: 4; }

  /* Section heading between groups */
  .section-head {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.022em;
    margin: 22px 0 10px;
    color: var(--fg);
  }
  .section-head:first-child { margin-top: 4px; }

  /* States */
  .state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 24px 40px;
    color: var(--fg-secondary); text-align: center;
    gap: 10px;
  }
  .state .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--separator-strong);
    border-top-color: var(--tint);
    border-radius: 50%; animation: spin 0.9s linear infinite;
  }
  .state-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--bg-elev-2);
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-tertiary);
    margin-bottom: 6px;
  }
  .state-title { font-size: 17px; font-weight: 600; color: var(--fg); }
  .state-body { font-size: 14px; max-width: 280px; }

  /* Stagger-in animation */
  .article {
    animation: rise 0.45s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Footer */
  footer {
    text-align: center; padding: 16px 20px 0;
    color: var(--fg-tertiary); font-size: 11px;
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="nav-row">
      <span class="nav-title">News4Brooke</span>
      <button class="icon-btn" id="refresh-btn" type="button" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-3.2-6.9"/>
          <path d="M21 4v5h-5"/>
        </svg>
      </button>
    </div>
    <h1 class="large-title" id="greeting">Today</h1>
    <div class="subtitle" id="subtitle">Loading the latest headlines</div>
    <div class="segmented" id="tabs" role="tablist">
      <button class="seg active" data-cat="all" role="tab">For You</button>
      <button class="seg" data-cat="founders" role="tab">Founders &amp; VC</button>
      <button class="seg" data-cat="legal-tech" role="tab">Legal Tech</button>
      <button class="seg" data-cat="bravo" role="tab">Bravo</button>
      <button class="seg" data-cat="pop-culture" role="tab">Pop Culture</button>
      <button class="seg" data-cat="us-news" role="tab">US</button>
      <button class="seg" data-cat="canada-news" role="tab">Canada</button>
      <button class="seg" data-cat="israel-iran" role="tab">Israel/Iran</button>
    </div>
  </div>
</header>

<main>
  <div id="feed">
    <div class="state">
      <div class="spinner"></div>
      <div class="state-body">Gathering today's headlines…</div>
    </div>
  </div>
</main>

<footer>News4Brooke · curated daily for you</footer>

<script src="app.js"></script>
<script>
  // collapse-on-scroll for the title chrome
  const onScroll = () => {
    document.body.classList.toggle('scrolled', window.scrollY > 24);
  };
  window.addEventListener('scroll', onScroll, { passive: true });
</script>
</body>
</html>
