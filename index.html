<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#fbfbfd" media="(prefers-color-scheme: light)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="News4Brooke" />
<title>News4Brooke</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<style>
  /* ============ Design tokens — mobile-first ============ */
  :root {
    --bg:            #000000;
    --bg-elev-1:     #0c0c0e;
    --bg-elev-2:     #141418;
    --bg-elev-3:     #1d1d23;
    --hairline:      rgba(255,255,255,0.06);
    --hairline-2:    rgba(255,255,255,0.10);

    --fg:            #f7f7f9;
    --fg-2:          rgba(235,235,245,0.62);
    --fg-3:          rgba(235,235,245,0.34);

    --tint:          #0a84ff;

    --c-founders:   #d4af6a;
    --c-ai:         #a78bfa;
    --c-legal:      #67c9c1;
    --c-markets:    #5ec27a;
    --c-style:      #e88aa5;
    --c-pop:        #e8a572;
    --c-us:         #8ba9d9;
    --c-canada:    #d88a8a;
    --c-israel:    #b89dd6;

    --r-card:    20px;
    --r-thumb:   14px;
    --r-chip:    999px;

    /* Mobile-tuned spacing */
    --pad-edge:  18px;
    --gutter:    14px;

    --safe-top:    env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:            #fbfbfd;
      --bg-elev-1:     #ffffff;
      --bg-elev-2:     #ffffff;
      --bg-elev-3:     #ececef;
      --hairline:      rgba(60,60,67,0.08);
      --hairline-2:    rgba(60,60,67,0.14);
      --fg:            #1d1d1f;
      --fg-2:          rgba(60,60,67,0.70);
      --fg-3:          rgba(60,60,67,0.40);
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Inter", system-ui, sans-serif;
    font-size: 17px; line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    letter-spacing: -0.011em;
    overscroll-behavior-y: contain;
    font-feature-settings: "ss01", "ss02", "kern";
    -webkit-touch-callout: none;
  }
  body {
    min-height: 100vh;
    padding: var(--safe-top) 0 calc(var(--safe-bottom) + 88px);
  }
  img { -webkit-user-drag: none; user-select: none; }

  /* ============ Glass header ============ */
  header {
    position: sticky; top: 0; z-index: 30;
    background: color-mix(in srgb, var(--bg) 68%, transparent);
    -webkit-backdrop-filter: saturate(180%) blur(36px);
    backdrop-filter: saturate(180%) blur(36px);
    border-bottom: 0.5px solid transparent;
    transition: border-color 0.2s ease;
  }
  body.scrolled header { border-bottom-color: var(--hairline); }
  .header-inner { max-width: 760px; margin: 0 auto; padding: 8px var(--pad-edge) 12px; }
  .nav-row {
    display: flex; align-items: center; justify-content: space-between;
    min-height: 44px;
  }
  .nav-title {
    font-size: 17px; font-weight: 600; letter-spacing: -0.022em;
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
  }
  body.scrolled .nav-title { opacity: 1; transform: translateY(0); }
  .header-actions { display:flex; align-items:center; gap: 10px; }

  .live-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 11px 5px 9px;
    border-radius: 999px;
    background: rgba(94, 194, 122, 0.14);
    color: #5ec27a;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #5ec27a;
    box-shadow: 0 0 0 0 rgba(94,194,122, 0.6);
    animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(94,194,122, 0.6); }
    50%      { box-shadow: 0 0 0 8px rgba(94,194,122, 0); }
  }

  .eyebrow {
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--fg-3);
    margin: 6px 0 2px;
  }
  .large-title {
    font-size: 34px; font-weight: 700; letter-spacing: -0.030em;
    margin: 2px 0 3px; line-height: 1.02;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
  }
  .subtitle {
    color: var(--fg-2);
    font-size: 13.5px; font-weight: 400;
    margin-bottom: 16px;
    letter-spacing: -0.005em;
  }

  /* ============ Segmented tabs ============ */
  .segmented {
    display: flex; gap: 8px; overflow-x: auto;
    margin: 0 calc(-1 * var(--pad-edge)); padding: 4px var(--pad-edge) 10px;
    scroll-snap-type: x proximity;
    scrollbar-width: none;
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
            mask-image: linear-gradient(90deg, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
  }
  .segmented::-webkit-scrollbar { display: none; }
  .seg {
    flex: 0 0 auto; scroll-snap-align: start;
    appearance: none; -webkit-appearance: none;
    background: var(--bg-elev-2);
    border: 0.5px solid var(--hairline);
    color: var(--fg-2);
    padding: 9px 16px;
    border-radius: var(--r-chip);
    font-size: 14px; font-weight: 500;
    letter-spacing: -0.005em;
    white-space: nowrap; cursor: pointer;
    min-height: 36px;
    transition: background 0.18s ease, color 0.18s ease, transform 0.12s ease, border-color 0.18s ease;
  }
  .seg:active { transform: scale(0.95); }
  .seg.active {
    background: var(--fg); color: var(--bg);
    border-color: var(--fg); font-weight: 600;
  }

  /* ============ Main feed ============ */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 4px 0 60px;
  }
  .wrap { padding: 0 var(--pad-edge); }

  /* ---- Section header ---- */
  .section-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 30px var(--pad-edge) 12px;
    padding-top: 6px;
  }
  .section-header:first-child { margin-top: 8px; }
  .section-header h2 {
    margin: 0;
    font-size: 24px; font-weight: 700; letter-spacing: -0.026em;
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
  }
  .section-header h2 .section-dot {
    display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    background: var(--section-color, var(--tint));
    margin-right: 10px; vertical-align: middle;
    transform: translateY(-2px);
    box-shadow: 0 0 14px var(--section-color, var(--tint));
    opacity: 0.95;
  }
  .section-header .see-more {
    font-size: 14px; font-weight: 500;
    color: var(--tint);
    text-decoration: none;
    padding: 6px 0;
  }
  .section-header .see-more:active { opacity: 0.55; }

  /* ============ Article base ============ */
  .article {
    position: relative;
    display: block; text-decoration: none; color: inherit;
    transition: transform 0.18s ease, background 0.18s ease;
    will-change: transform;
    animation: rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .article:active { transform: scale(0.987); }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0; color: var(--chip-color, var(--tint));
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.11em;
    text-transform: uppercase;
  }
  .chip::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--chip-color, var(--tint));
    box-shadow: 0 0 8px var(--chip-color, var(--tint));
    opacity: 0.95;
  }
  .chip[data-cat="founders"]    { --chip-color: var(--c-founders); }
  .chip[data-cat="ai"]          { --chip-color: var(--c-ai); }
  .chip[data-cat="legal-tech"]  { --chip-color: var(--c-legal); }
  .chip[data-cat="markets"]     { --chip-color: var(--c-markets); }
  .chip[data-cat="style"]       { --chip-color: var(--c-style); }
  .chip[data-cat="pop-culture"] { --chip-color: var(--c-pop); }
  .chip[data-cat="us-news"]     { --chip-color: var(--c-us); }
  .chip[data-cat="canada-news"] { --chip-color: var(--c-canada); }
  .chip[data-cat="israel-iran"] { --chip-color: var(--c-israel); }

  .source { font-weight: 500; color: var(--fg-2); text-transform: none; letter-spacing: -0.005em; font-size: 12.5px; }
  .dot    { color: var(--fg-3); }
  .timeago{ color: var(--fg-3); font-size: 12.5px; font-variant-numeric: tabular-nums; }

  .meta {
    display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
    margin-bottom: 9px;
  }

  /* ---- HERO — editorial, full-bleed with overlay text ---- */
  .article.hero {
    position: relative;
    display: block;
    margin: 0 0 12px;
    border-radius: 0;
    overflow: hidden;
    aspect-ratio: 4 / 5;
    max-height: 78vh;
    background: var(--bg-elev-2);
  }
  .article.hero .cover {
    position: absolute; inset: 0;
    background: var(--bg-elev-3);
    overflow: hidden;
  }
  .article.hero .cover img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: transform 0.6s ease;
  }
  .article.hero:active .cover img { transform: scale(1.02); }
  .article.hero .shade {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0) 30%, rgba(0,0,0,0.30) 55%, rgba(0,0,0,0.85) 100%);
  }
  .article.hero .body {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 22px var(--pad-edge) 26px;
    color: #fff;
  }
  .article.hero .body .meta .source,
  .article.hero .body .meta .timeago { color: rgba(255,255,255,0.78); }
  .article.hero .body .meta .dot { color: rgba(255,255,255,0.55); }
  .article.hero h2 {
    margin: 0 0 8px;
    font-size: 26px; line-height: 1.15; letter-spacing: -0.028em;
    font-weight: 700; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    overflow: hidden;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
  }
  .article.hero p {
    margin: 0;
    font-size: 14px; line-height: 1.42;
    color: rgba(255,255,255,0.88);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  /* Hero without image — solid card with category-tinted bg */
  .article.hero.no-image {
    aspect-ratio: auto;
    background: linear-gradient(135deg,
      color-mix(in srgb, var(--hero-tint, var(--tint)) 22%, var(--bg-elev-2)) 0%,
      var(--bg-elev-2) 70%);
    border-radius: var(--r-card);
    margin: 0 var(--pad-edge) 12px;
    padding: 26px 22px 28px;
    border: 0.5px solid var(--hairline);
  }
  .article.hero.no-image .cover,
  .article.hero.no-image .shade { display: none; }
  .article.hero.no-image .body { position: static; padding: 0; color: var(--fg); }
  .article.hero.no-image .body .meta .source,
  .article.hero.no-image .body .meta .timeago { color: var(--fg-2); }
  .article.hero.no-image .body .meta .dot { color: var(--fg-3); }
  .article.hero.no-image h2 { color: var(--fg); text-shadow: none; font-size: 24px; }
  .article.hero.no-image p { color: var(--fg-2); }

  /* ---- STANDARD — thumbnail on right ---- */
  .article.standard {
    display: grid;
    grid-template-columns: 1fr 100px;
    gap: 14px;
    padding: 18px var(--pad-edge);
    border-bottom: 0.5px solid var(--hairline);
    align-items: start;
  }
  .article.standard:last-child { border-bottom: none; }
  .article.standard .body { min-width: 0; }
  .article.standard h2 {
    margin: 0 0 6px;
    font-size: 17px; line-height: 1.28; letter-spacing: -0.021em;
    font-weight: 600;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .article.standard p {
    margin: 0;
    font-size: 13.5px; line-height: 1.4; color: var(--fg-2);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .article.standard .thumb {
    width: 100px; height: 100px;
    border-radius: var(--r-thumb);
    background: var(--bg-elev-2);
    overflow: hidden;
    flex: 0 0 auto;
  }
  .article.standard .thumb img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  /* ---- COMPACT — text only ---- */
  .article.compact {
    padding: 18px var(--pad-edge);
    border-bottom: 0.5px solid var(--hairline);
  }
  .article.compact:last-child { border-bottom: none; }
  .article.compact h2 {
    margin: 0 0 6px;
    font-size: 17px; line-height: 1.28; letter-spacing: -0.021em;
    font-weight: 600;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .article.compact p {
    margin: 0;
    font-size: 13.5px; line-height: 1.4; color: var(--fg-2);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .icon-btn {
    appearance: none; -webkit-appearance: none;
    background: var(--bg-elev-3); color: var(--fg);
    border: none;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, opacity 0.2s ease;
  }
  .icon-btn:active { transform: scale(0.92); background: var(--hairline-2); }
  .icon-btn svg { width: 16px; height: 16px; }
  .icon-btn.spin svg { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============ Jennifer FAB — primary CTA ============ */
  .fab.fab-jennifer {
    position: fixed;
    right: calc(env(safe-area-inset-right) + 16px);
    bottom: calc(env(safe-area-inset-bottom) + 22px);
    z-index: 40;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 18px 12px 12px;
    height: 54px;
    border-radius: 999px;
    background: linear-gradient(135deg, #a78bfa 0%, #7c5cf5 100%);
    color: #fff;
    border: none;
    box-shadow:
      0 12px 36px rgba(124,92,245,0.45),
      0 2px 8px rgba(0,0,0,0.30);
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.18s ease, box-shadow 0.2s ease, opacity 0.2s ease;
  }
  .fab.fab-jennifer:active {
    transform: scale(0.96);
    box-shadow: 0 6px 20px rgba(124,92,245,0.35), 0 2px 6px rgba(0,0,0,0.25);
  }
  .fab-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.22);
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
    letter-spacing: -0.01em;
    backdrop-filter: blur(8px);
  }
  .fab-label {
    font-weight: 600; font-size: 14.5px;
    letter-spacing: -0.005em;
  }

  /* ============ Jennifer chat sheet ============ */
  .jennifer-backdrop {
    position: fixed; inset: 0; z-index: 49;
    background: rgba(0,0,0,0.55);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.28s ease;
  }
  .jennifer-backdrop.open { opacity: 1; pointer-events: auto; }

  .jennifer-sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    z-index: 50;
    background: var(--bg-elev-1);
    border-top: 0.5px solid var(--hairline-2);
    border-radius: 28px 28px 0 0;
    padding: 6px 0 0;
    max-height: 92vh; min-height: 60vh;
    display: flex; flex-direction: column;
    transform: translateY(110%);
    transition: transform 0.34s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: 0 -12px 60px rgba(0,0,0,0.55);
  }
  .jennifer-sheet.open { transform: translateY(0); }

  .jennifer-grabber {
    width: 38px; height: 4px;
    border-radius: 2px;
    background: var(--hairline-2);
    margin: 8px auto 6px;
  }

  .jennifer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 18px 14px;
    border-bottom: 0.5px solid var(--hairline);
  }
  .jennifer-id { display: flex; align-items: center; gap: 12px; }
  .jennifer-avatar-lg {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa 0%, #7c5cf5 100%);
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 17px;
    box-shadow: 0 4px 14px rgba(124,92,245,0.40);
  }
  .jennifer-name {
    font-size: 17px; font-weight: 700; letter-spacing: -0.018em;
  }
  .jennifer-status {
    font-size: 12px; color: var(--fg-2);
    display: flex; align-items: center; gap: 6px;
    margin-top: 1px;
  }

  .jennifer-messages {
    flex: 1; overflow-y: auto;
    padding: 18px 16px 8px;
    display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: none;
  }
  .jennifer-messages::-webkit-scrollbar { display: none; }

  .msg {
    max-width: 86%;
    padding: 11px 14px;
    border-radius: 18px;
    font-size: 15px; line-height: 1.42;
    letter-spacing: -0.008em;
    animation: msgrise 0.32s cubic-bezier(0.16, 1, 0.3, 1) both;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  @keyframes msgrise {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #2563eb 0%, #0a84ff 100%);
    color: #fff;
    border-bottom-right-radius: 6px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--bg-elev-3);
    color: var(--fg);
    border-bottom-left-radius: 6px;
  }
  .msg.assistant.error {
    background: rgba(255, 90, 90, 0.10);
    color: #ff9c9c;
    border: 0.5px solid rgba(255, 90, 90, 0.30);
  }
  .msg-typing {
    align-self: flex-start;
    background: var(--bg-elev-3);
    padding: 14px 16px; border-radius: 18px; border-bottom-left-radius: 6px;
    display: inline-flex; gap: 4px;
  }
  .msg-typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--fg-3);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .msg-typing span:nth-child(2) { animation-delay: 0.15s; }
  .msg-typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .jennifer-greeting {
    text-align: center; padding: 28px 24px 8px;
    color: var(--fg-2);
  }
  .jennifer-greeting .hi {
    font-size: 22px; font-weight: 600; letter-spacing: -0.022em;
    color: var(--fg);
    margin-bottom: 6px;
  }
  .jennifer-greeting .pitch {
    font-size: 14px; line-height: 1.45;
  }

  .jennifer-suggestions {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 10px 16px;
    border-top: 0.5px solid var(--hairline);
    scrollbar-width: none;
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
            mask-image: linear-gradient(90deg, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
  }
  .jennifer-suggestions::-webkit-scrollbar { display: none; }
  .suggestion {
    flex: 0 0 auto;
    appearance: none; -webkit-appearance: none;
    background: var(--bg-elev-2);
    border: 0.5px solid var(--hairline);
    color: var(--fg);
    padding: 8px 13px;
    border-radius: 999px;
    font-size: 13px; font-weight: 500;
    white-space: nowrap; cursor: pointer;
    transition: transform 0.12s ease, background 0.15s ease;
  }
  .suggestion:active { transform: scale(0.96); background: var(--bg-elev-3); }

  .jennifer-input-bar {
    display: flex; align-items: flex-end; gap: 8px;
    padding: 10px 14px calc(14px + env(safe-area-inset-bottom));
    border-top: 0.5px solid var(--hairline);
    background: var(--bg-elev-1);
  }
  .jennifer-input-bar textarea {
    flex: 1;
    appearance: none; -webkit-appearance: none;
    background: var(--bg-elev-2);
    border: 0.5px solid var(--hairline);
    color: var(--fg);
    padding: 11px 14px;
    border-radius: 22px;
    font-family: inherit;
    font-size: 15.5px; line-height: 1.35;
    letter-spacing: -0.008em;
    resize: none;
    max-height: 140px;
    min-height: 44px;
    outline: none;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .jennifer-input-bar textarea:focus {
    border-color: var(--tint);
    background: var(--bg-elev-1);
  }
  .jennifer-input-bar textarea::placeholder { color: var(--fg-3); }

  .jennifer-send {
    appearance: none; -webkit-appearance: none;
    width: 38px; height: 38px;
    border: none; border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa 0%, #7c5cf5 100%);
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s ease, opacity 0.18s ease, box-shadow 0.2s ease;
    box-shadow: 0 3px 10px rgba(124,92,245,0.35);
  }
  .jennifer-send:active { transform: scale(0.92); }
  .jennifer-send:disabled { opacity: 0.4; cursor: default; }
  .jennifer-send svg { width: 16px; height: 16px; }

  body.jennifer-open { overflow: hidden; }

  /* ============ Loading skeletons ============ */
  .skel-hero {
    position: relative;
    aspect-ratio: 4 / 5;
    background: linear-gradient(90deg, var(--bg-elev-2) 25%, var(--bg-elev-3) 50%, var(--bg-elev-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite linear;
    margin-bottom: 12px;
  }
  .skel-row {
    display: grid; grid-template-columns: 1fr 100px; gap: 14px;
    padding: 18px var(--pad-edge);
    border-bottom: 0.5px solid var(--hairline); align-items: start;
  }
  .skel-line {
    height: 12px; border-radius: 4px;
    background: linear-gradient(90deg, var(--bg-elev-2) 25%, var(--bg-elev-3) 50%, var(--bg-elev-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite linear;
    margin-bottom: 8px;
  }
  .skel-line.short { width: 32%; height: 9px; margin-bottom: 14px; }
  .skel-line.title { width: 95%; height: 16px; }
  .skel-line.title-2 { width: 70%; height: 16px; margin-bottom: 12px; }
  .skel-line.body-2 { width: 55%; height: 10px; margin-bottom: 0; }
  .skel-thumb {
    width: 100px; height: 100px; border-radius: var(--r-thumb);
    background: linear-gradient(90deg, var(--bg-elev-2) 25%, var(--bg-elev-3) 50%, var(--bg-elev-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite linear;
  }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

  .state {
    text-align: center; padding: 60px 24px;
    color: var(--fg-2); font-size: 14px;
  }

  footer {
    text-align: center; padding: 36px 20px 0;
    color: var(--fg-3); font-size: 11px;
    letter-spacing: 0.04em;
  }

  /* ============ Tablet / desktop scale-up ============ */
  @media (min-width: 720px) {
    :root { --pad-edge: 28px; }
    .article.hero { aspect-ratio: 16 / 9; max-height: 560px; }
    .article.hero h2 { font-size: 32px; }
    .article.hero p { font-size: 15px; }
    .large-title { font-size: 38px; }
    .section-header h2 { font-size: 26px; }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="nav-row">
      <span class="nav-title">News4Brooke</span>
      <div class="header-actions">
        <span class="live-pill"><span class="live-dot"></span>Live</span>
        <button class="icon-btn" id="refresh-btn-top" type="button" aria-label="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-3.2-6.9"/><path d="M21 4v5h-5"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="eyebrow" id="eyebrow">Today</div>
    <h1 class="large-title" id="greeting">News4Brooke</h1>
    <div class="subtitle" id="subtitle">Curating your headlines…</div>
    <div class="segmented" id="tabs" role="tablist">
      <button class="seg active" data-cat="all" role="tab">For You</button>
      <button class="seg" data-cat="founders" role="tab">Founders &amp; VC</button>
      <button class="seg" data-cat="ai" role="tab">AI</button>
      <button class="seg" data-cat="legal-tech" role="tab">Legal Tech</button>
      <button class="seg" data-cat="markets" role="tab">Markets</button>
      <button class="seg" data-cat="style" role="tab">Style &amp; Beauty</button>
      <button class="seg" data-cat="pop-culture" role="tab">Pop Culture</button>
      <button class="seg" data-cat="us-news" role="tab">US</button>
      <button class="seg" data-cat="canada-news" role="tab">Canada</button>
      <button class="seg" data-cat="israel-iran" role="tab">Israel/Iran</button>
    </div>
  </div>
</header>

<main>
  <div id="feed">
    <div class="skel-hero"></div>
    <div class="skel-row">
      <div>
        <div class="skel-line short"></div>
        <div class="skel-line title"></div>
        <div class="skel-line title-2"></div>
        <div class="skel-line body-2"></div>
      </div>
      <div class="skel-thumb"></div>
    </div>
    <div class="skel-row">
      <div>
        <div class="skel-line short"></div>
        <div class="skel-line title"></div>
        <div class="skel-line title-2"></div>
        <div class="skel-line body-2"></div>
      </div>
      <div class="skel-thumb"></div>
    </div>
    <div class="skel-row">
      <div>
        <div class="skel-line short"></div>
        <div class="skel-line title"></div>
        <div class="skel-line title-2"></div>
        <div class="skel-line body-2"></div>
      </div>
      <div class="skel-thumb"></div>
    </div>
  </div>
</main>

<!-- Jennifer — AI chat assistant -->
<button class="fab fab-jennifer" id="jennifer-fab" type="button" aria-label="Chat with Jennifer">
  <span class="fab-avatar">J</span>
  <span class="fab-label">Ask Jennifer</span>
</button>

<div class="jennifer-backdrop" id="jennifer-backdrop"></div>
<div class="jennifer-sheet" id="jennifer-sheet" role="dialog" aria-label="Jennifer chat">
  <div class="jennifer-grabber"></div>
  <div class="jennifer-header">
    <div class="jennifer-id">
      <div class="jennifer-avatar-lg">J</div>
      <div>
        <div class="jennifer-name">Jennifer</div>
        <div class="jennifer-status"><span class="live-dot" style="background:#5ec27a;"></span> Caught up on today's news</div>
      </div>
    </div>
    <button class="icon-btn" id="jennifer-close" type="button" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6L6 18"/><path d="M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div class="jennifer-messages" id="jennifer-messages"></div>
  <div class="jennifer-suggestions" id="jennifer-suggestions">
    <button class="suggestion" data-q="What are today's top stories?">Top stories today</button>
    <button class="suggestion" data-q="Anything new in venture funding this week?">VC funding news</button>
    <button class="suggestion" data-q="What's the latest on Israel and Iran?">Israel/Iran update</button>
    <button class="suggestion" data-q="Any big AI launches today?">AI launches</button>
    <button class="suggestion" data-q="What's happening in the markets?">Market summary</button>
  </div>
  <form class="jennifer-input-bar" id="jennifer-form">
    <textarea
      id="jennifer-input"
      placeholder="Ask Jennifer anything…"
      rows="1"
      autocomplete="off"
      autocorrect="on"
      spellcheck="true"></textarea>
    <button type="submit" class="jennifer-send" id="jennifer-send" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V5"/><path d="M5 12l7-7 7 7"/>
      </svg>
    </button>
  </form>
</div>

<footer>News4Brooke · curated continuously for you</footer>

<script src="app.js"></script>
<script>
  const onScroll = () => {
    document.body.classList.toggle('scrolled', window.scrollY > 24);
  };
  window.addEventListener('scroll', onScroll, { passive: true });
</script>
</body>
</html>
