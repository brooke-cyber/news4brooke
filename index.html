<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#fbfbfd" media="(prefers-color-scheme: light)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="News4Brooke" />
<title>News4Brooke</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<style>
  /* ============ Editorial design system ============ */
  :root {
    --bg:            #000000;
    --bg-elev-1:     #0b0b0d;
    --bg-elev-2:     #131318;
    --bg-elev-3:     #1c1c22;
    --hairline:      rgba(255,255,255,0.06);
    --hairline-2:    rgba(255,255,255,0.10);

    --fg:            #f7f7f9;
    --fg-2:          rgba(235,235,245,0.62);
    --fg-3:          rgba(235,235,245,0.34);

    --tint:          #0a84ff;

    --c-founders:   #d4af6a;
    --c-ai:         #a78bfa;
    --c-legal:      #67c9c1;
    --c-markets:    #5ec27a;
    --c-style:      #e88aa5;
    --c-pop:        #e8a572;
    --c-us:         #8ba9d9;
    --c-canada:     #d88a8a;
    --c-israel:     #b89dd6;

    --r-card:    22px;
    --r-thumb:   14px;
    --r-chip:    999px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:            #fbfbfd;
      --bg-elev-1:     #ffffff;
      --bg-elev-2:     #ffffff;
      --bg-elev-3:     #ececef;
      --hairline:      rgba(60,60,67,0.08);
      --hairline-2:    rgba(60,60,67,0.14);
      --fg:            #1d1d1f;
      --fg-2:          rgba(60,60,67,0.70);
      --fg-3:          rgba(60,60,67,0.40);
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Inter", system-ui, sans-serif;
    font-size: 17px; line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    letter-spacing: -0.011em;
    overscroll-behavior-y: contain;
    font-feature-settings: "ss01", "ss02", "kern";
  }
  body {
    min-height: 100vh;
    padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 56px);
  }

  /* ============ Glass header ============ */
  header {
    position: sticky; top: 0; z-index: 30;
    background: color-mix(in srgb, var(--bg) 68%, transparent);
    -webkit-backdrop-filter: saturate(180%) blur(34px);
    backdrop-filter: saturate(180%) blur(34px);
    border-bottom: 0.5px solid transparent;
    transition: border-color 0.2s ease;
  }
  body.scrolled header { border-bottom-color: var(--hairline); }
  .header-inner { max-width: 720px; margin: 0 auto; padding: 6px 22px 14px; }
  .nav-row { display: flex; align-items: center; justify-content: space-between; min-height: 44px; }
  .nav-title {
    font-size: 16px; font-weight: 600; letter-spacing: -0.022em;
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
  }
  body.scrolled .nav-title { opacity: 1; transform: translateY(0); }
  .header-actions { display:flex; align-items:center; gap: 10px; }

  .live-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px 4px 8px;
    border-radius: 999px;
    background: rgba(94, 194, 122, 0.13);
    color: #5ec27a;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.02em; text-transform: uppercase;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #5ec27a;
    box-shadow: 0 0 0 0 rgba(94,194,122, 0.6);
    animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(94,194,122, 0.6); }
    50%      { box-shadow: 0 0 0 6px rgba(94,194,122, 0); }
  }

  .icon-btn {
    appearance: none; -webkit-appearance: none;
    background: var(--bg-elev-3); color: var(--fg);
    border: none;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, opacity 0.2s ease;
  }
  .icon-btn:active { transform: scale(0.92); background: var(--hairline-2); }
  .icon-btn:disabled { opacity: 0.5; }
  .icon-btn svg { width: 16px; height: 16px; }
  .icon-btn.spin svg { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--fg-3);
    margin: 4px 0 2px;
  }
  .large-title {
    font-size: 36px; font-weight: 700; letter-spacing: -0.030em;
    margin: 2px 0 2px; line-height: 1.02;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
  }
  .subtitle {
    color: var(--fg-2);
    font-size: 13px; font-weight: 400;
    margin-bottom: 18px;
    letter-spacing: -0.005em;
  }

  /* ============ Segmented tabs ============ */
  .segmented {
    display: flex; gap: 6px; overflow-x: auto;
    margin: 0 -22px; padding: 4px 22px 10px;
    scroll-snap-type: x proximity;
    scrollbar-width: none;
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
            mask-image: linear-gradient(90deg, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
  }
  .segmented::-webkit-scrollbar { display: none; }
  .seg {
    flex: 0 0 auto; scroll-snap-align: start;
    appearance: none; -webkit-appearance: none;
    background: var(--bg-elev-2);
    border: 0.5px solid var(--hairline);
    color: var(--fg-2);
    padding: 8px 15px;
    border-radius: var(--r-chip);
    font-size: 13.5px; font-weight: 500;
    letter-spacing: -0.005em;
    white-space: nowrap; cursor: pointer;
    transition: background 0.18s ease, color 0.18s ease, transform 0.12s ease, border-color 0.18s ease;
  }
  .seg:active { transform: scale(0.95); }
  .seg.active {
    background: var(--fg); color: var(--bg);
    border-color: var(--fg); font-weight: 600;
  }

  /* ============ Main feed ============ */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 6px 16px 60px;
  }

  /* Section headers — like Apple News section dividers */
  .section-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 26px 4px 12px;
    padding-top: 6px;
  }
  .section-header:first-child { margin-top: 6px; }
  .section-header h2 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.024em;
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
  }
  .section-header h2 .section-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--section-color, var(--tint));
    margin-right: 10px; vertical-align: middle;
    transform: translateY(-2px);
    box-shadow: 0 0 12px var(--section-color, var(--tint));
    opacity: 0.9;
  }
  .section-header .see-more {
    font-size: 13px; font-weight: 500; color: var(--fg-3);
  }

  /* ---------- Article — base ---------- */
  .article {
    position: relative;
    display: block; text-decoration: none; color: inherit;
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    will-change: transform;
    animation: rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .article:active { transform: scale(0.985); }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0;
    color: var(--chip-color, var(--tint));
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.10em;
    text-transform: uppercase;
  }
  .chip::before {
    content: "";
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--chip-color, var(--tint));
    box-shadow: 0 0 8px var(--chip-color, var(--tint));
    opacity: 0.9;
  }
  .chip[data-cat="founders"]    { --chip-color: var(--c-founders); }
  .chip[data-cat="ai"]          { --chip-color: var(--c-ai); }
  .chip[data-cat="legal-tech"]  { --chip-color: var(--c-legal); }
  .chip[data-cat="markets"]     { --chip-color: var(--c-markets); }
  .chip[data-cat="style"]       { --chip-color: var(--c-style); }
  .chip[data-cat="pop-culture"] { --chip-color: var(--c-pop); }
  .chip[data-cat="us-news"]     { --chip-color: var(--c-us); }
  .chip[data-cat="canada-news"] { --chip-color: var(--c-canada); }
  .chip[data-cat="israel-iran"] { --chip-color: var(--c-israel); }

  .source { font-weight: 500; color: var(--fg-2); text-transform: none; letter-spacing: -0.005em; font-size: 12px; }
  .dot    { color: var(--fg-3); }
  .timeago{ color: var(--fg-3); font-size: 12px; font-variant-numeric: tabular-nums; }

  .meta {
    display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
    margin-bottom: 9px;
  }

  /* ---------- HERO card with full-bleed cover ---------- */
  .article.hero {
    background: var(--bg-elev-1);
    border: 0.5px solid var(--hairline);
    border-radius: var(--r-card);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .article.hero .cover {
    position: relative;
    width: 100%; aspect-ratio: 16 / 10;
    background: var(--bg-elev-3);
    overflow: hidden;
  }
  .article.hero .cover img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: transform 0.6s ease;
  }
  .article.hero:active .cover img { transform: scale(1.02); }
  .article.hero .cover-shade {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%);
  }
  .article.hero .body { padding: 16px 18px 18px; }
  .article.hero h2 {
    margin: 0 0 7px;
    font-size: 22px; line-height: 1.2; letter-spacing: -0.024em;
    font-weight: 700;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .article.hero p {
    margin: 0;
    font-size: 14px; line-height: 1.42; color: var(--fg-2);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ---------- STANDARD card — thumbnail on right ---------- */
  .article.standard {
    display: grid;
    grid-template-columns: 1fr 96px;
    gap: 14px;
    padding: 16px 4px;
    border-bottom: 0.5px solid var(--hairline);
    align-items: start;
  }
  .article.standard:last-child { border-bottom: none; }
  .article.standard .body { min-width: 0; }
  .article.standard h2 {
    margin: 0 0 6px;
    font-size: 16px; line-height: 1.3; letter-spacing: -0.019em;
    font-weight: 600;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .article.standard p {
    margin: 0;
    font-size: 13px; line-height: 1.4; color: var(--fg-2);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .article.standard .thumb {
    width: 96px; height: 96px;
    border-radius: var(--r-thumb);
    background: var(--bg-elev-2);
    overflow: hidden;
    flex: 0 0 auto;
  }
  .article.standard .thumb img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  /* ---------- COMPACT — text only, no image ---------- */
  .article.compact {
    padding: 14px 4px;
    border-bottom: 0.5px solid var(--hairline);
  }
  .article.compact:last-child { border-bottom: none; }
  .article.compact h2 {
    margin: 0 0 5px;
    font-size: 15.5px; line-height: 1.3; letter-spacing: -0.018em;
    font-weight: 600;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .article.compact p {
    margin: 0;
    font-size: 13px; line-height: 1.4; color: var(--fg-2);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ---------- Loading skeletons ---------- */
  .skel-hero, .skel-row { animation: rise 0.5s ease both; }
  .skel-hero {
    background: var(--bg-elev-1); border: 0.5px solid var(--hairline);
    border-radius: var(--r-card); overflow: hidden; margin-bottom: 16px;
  }
  .skel-hero-img {
    width: 100%; aspect-ratio: 16/10;
    background: linear-gradient(90deg, var(--bg-elev-2) 25%, var(--bg-elev-3) 50%, var(--bg-elev-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite linear;
  }
  .skel-hero-body { padding: 16px 18px 18px; }
  .skel-row {
    display: grid; grid-template-columns: 1fr 96px; gap: 14px;
    padding: 16px 4px; border-bottom: 0.5px solid var(--hairline); align-items: start;
  }
  .skel-line {
    height: 12px; border-radius: 4px;
    background: linear-gradient(90deg, var(--bg-elev-2) 25%, var(--bg-elev-3) 50%, var(--bg-elev-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite linear;
    margin-bottom: 8px;
  }
  .skel-line.short { width: 35%; height: 9px; margin-bottom: 14px; }
  .skel-line.title { width: 95%; height: 16px; }
  .skel-line.title-2 { width: 70%; height: 16px; margin-bottom: 12px; }
  .skel-line.body { width: 90%; height: 10px; }
  .skel-line.body-2 { width: 55%; height: 10px; margin-bottom: 0; }
  .skel-thumb {
    width: 96px; height: 96px; border-radius: var(--r-thumb);
    background: linear-gradient(90deg, var(--bg-elev-2) 25%, var(--bg-elev-3) 50%, var(--bg-elev-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite linear;
  }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

  .state {
    text-align: center; padding: 60px 24px;
    color: var(--fg-2); font-size: 14px;
  }

  footer {
    text-align: center; padding: 26px 20px 0;
    color: var(--fg-3); font-size: 11px;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="nav-row">
      <span class="nav-title">News4Brooke</span>
      <div class="header-actions">
        <span class="live-pill"><span class="live-dot"></span>Live</span>
        <button class="icon-btn" id="refresh-btn" type="button" aria-label="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-3.2-6.9"/><path d="M21 4v5h-5"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="eyebrow" id="eyebrow">Today</div>
    <h1 class="large-title" id="greeting">News4Brooke</h1>
    <div class="subtitle" id="subtitle">Curating your headlines…</div>
    <div class="segmented" id="tabs" role="tablist">
      <button class="seg active" data-cat="all" role="tab">For You</button>
      <button class="seg" data-cat="founders" role="tab">Founders &amp; VC</button>
      <button class="seg" data-cat="ai" role="tab">AI</button>
      <button class="seg" data-cat="legal-tech" role="tab">Legal Tech</button>
      <button class="seg" data-cat="markets" role="tab">Markets</button>
      <button class="seg" data-cat="style" role="tab">Style &amp; Beauty</button>
      <button class="seg" data-cat="pop-culture" role="tab">Pop Culture</button>
      <button class="seg" data-cat="us-news" role="tab">US</button>
      <button class="seg" data-cat="canada-news" role="tab">Canada</button>
      <button class="seg" data-cat="israel-iran" role="tab">Israel/Iran</button>
    </div>
  </div>
</header>

<main>
  <div id="feed">
    <div class="skel-hero">
      <div class="skel-hero-img"></div>
      <div class="skel-hero-body">
        <div class="skel-line short"></div>
        <div class="skel-line title"></div>
        <div class="skel-line title-2"></div>
        <div class="skel-line body"></div>
        <div class="skel-line body-2"></div>
      </div>
    </div>
    <div class="skel-row">
      <div>
        <div class="skel-line short"></div>
        <div class="skel-line title"></div>
        <div class="skel-line title-2"></div>
        <div class="skel-line body-2"></div>
      </div>
      <div class="skel-thumb"></div>
    </div>
    <div class="skel-row">
      <div>
        <div class="skel-line short"></div>
        <div class="skel-line title"></div>
        <div class="skel-line title-2"></div>
        <div class="skel-line body-2"></div>
      </div>
      <div class="skel-thumb"></div>
    </div>
    <div class="skel-row">
      <div>
        <div class="skel-line short"></div>
        <div class="skel-line title"></div>
        <div class="skel-line title-2"></div>
        <div class="skel-line body-2"></div>
      </div>
      <div class="skel-thumb"></div>
    </div>
  </div>
</main>

<footer>News4Brooke · curated continuously for you</footer>

<script src="app.js"></script>
<script>
  const onScroll = () => {
    document.body.classList.toggle('scrolled', window.scrollY > 24);
  };
  window.addEventListener('scroll', onScroll, { passive: true });
</script>
</body>
</html>
